name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  app:
    name: Lint + Build (app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/claude/upbeat-mendel-m8bom6' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    name: Deploy → GitHub Pages
    needs: app
    if: github.ref == 'refs/heads/claude/upbeat-mendel-m8bom6' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
